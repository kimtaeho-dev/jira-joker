</ul>
`;

// Navigation and routing
let currentDoc = 'catalog';

function navigate(docId) {
  currentDoc = docId;
  window.location.hash = docId;
  renderContent();
  updateActiveNav();
  closeSidebar();
  window.scrollTo(0, 0);
}

function renderContent() {
  const area = document.getElementById('content-area');
  area.innerHTML = documents[currentDoc] || '<p>문서를 찾을 수 없습니다.</p>';
}

function updateActiveNav() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.getAttribute('href') === '#' + currentDoc) {
      el.classList.add('active');
    }
  });
}

function toggleSection(el) {
  const section = el.closest('.sidebar-section');
  section.classList.toggle('open');
}

// Mobile sidebar
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

document.getElementById('mobile-menu-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
});

// Search
let searchIndex = null;

async function loadSearchIndex() {
  try {
    const resp = await fetch('search-index.json');
    searchIndex = await resp.json();
  } catch(e) {
    // Inline fallback - search won't work if JSON fails to load
    searchIndex = [];
  }
}

function handleSearch(query) {
  const container = document.getElementById('search-results');
  if (!query.trim()) {
    container.classList.add('hidden');
    container.innerHTML = '';
    return;
  }

  const q = query.toLowerCase();
  // Search in both the index and the document content
  const results = [];

  // Search index
  if (searchIndex) {
    searchIndex.forEach(entry => {
      const score = (entry.title.toLowerCase().includes(q) ? 2 : 0) +
                    (entry.content.toLowerCase().includes(q) ? 1 : 0);
      if (score > 0) {
        results.push({ ...entry, score });
      }
    });
  }

  // Also search document content
  Object.keys(documents).forEach(docId => {
    const content = documents[docId];
    if (content.toLowerCase().includes(q)) {
      const existing = results.find(r => r.url === '#' + docId);
      if (!existing) {
        const titles = { catalog: '정책 카탈로그', glossary: '전체 용어집', 'jira-spec': 'Jira 연동 기획서', 'jira-policies': 'Jira 연동 정책서', 'jira-glossary': 'Jira 연동 용어집', 'realtime-spec': '실시간 통신 기획서', 'realtime-policies': '실시간 통신 정책서', 'realtime-glossary': '실시간 통신 용어집', 'poker-spec': '포커 게임 기획서', 'poker-policies': '포커 게임 정책서', 'poker-glossary': '포커 게임 용어집', 'room-spec': '방 관리 기획서', 'room-policies': '방 관리 정책서', 'room-glossary': '방 관리 용어집' };
        results.push({ title: titles[docId] || docId, url: '#' + docId, score: 0.5, domain: '' });
      }
    }
  });

  results.sort((a, b) => b.score - a.score);
  const top = results.slice(0, 10);

  if (top.length === 0) {
    container.innerHTML = '<div class="px-3 py-2 text-sm text-gray-500">검색 결과가 없습니다</div>';
    container.classList.remove('hidden');
    return;
  }

  container.innerHTML = top.map(r => {
    const docId = r.url.replace('#', '');
    const domainBadge = r.domain ? '<span class="text-xs text-indigo-500 ml-1">' + r.domain + '</span>' : '';
    return '<a href="' + r.url + '" class="block px-3 py-2 text-sm hover:bg-indigo-50 rounded-lg cursor-pointer" onclick="navigate(\'' + docId + '\'); document.getElementById(\'search-input\').value=\'\'; document.getElementById(\'search-results\').classList.add(\'hidden\'); return false;">' +
      '<div class="font-medium text-gray-800">' + r.title + domainBadge + '</div>' +
      '</a>';
  }).join('');
  container.classList.remove('hidden');
}

// Hash-based routing
function handleHashChange() {
  const hash = window.location.hash.replace('#', '');
  if (hash && documents[hash]) {
    currentDoc = hash;
    renderContent();
    updateActiveNav();
  }
}

window.addEventListener('hashchange', handleHashChange);

// Initial render
window.addEventListener('DOMContentLoaded', () => {
  loadSearchIndex();
  handleHashChange();
  if (!window.location.hash || !documents[window.location.hash.replace('#', '')]) {
    navigate('catalog');
  }
});
</script>
